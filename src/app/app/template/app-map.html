<google-map
    height="100vh"
    width="100%"
    [zoom]="zoom">

    <map-marker
        #markerElem="mapMarker"
        *ngFor="let marker of markers"
        [position]="marker.position"
        (mapClick)="onClick(markerElem, marker.info)"
    >

    </map-marker>

    <map-info-window>
        <b>{{infoContent}}</b>
    </map-info-window>

<!--    <map-marker-->
<!--        [position]="currentLocation"-->
<!--        [icon]="icon">-->
<!--    </map-marker>-->

</google-map>
