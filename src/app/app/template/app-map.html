<google-map
    [zoom]="zoom"
    height="100vh"
    width="100%">

    <map-marker
        (mapClick)="onClick(marker)"
        *ngFor="let marker of markers"
        [icon]="currentLocationIcon"
        [position]="marker.position"
    >

    </map-marker>

    <map-marker
        (mapClick)="onClick(currentLocationMarker)"
        *ngIf="currentLocationMarker"
        [position]="currentLocationMarker.position"
    >
    </map-marker>

</google-map>
