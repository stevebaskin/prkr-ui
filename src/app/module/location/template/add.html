<article class="content">

    <form>
        <fieldset>
            <ul>
                <li>
                    <div class="form-label">
                        <label>Location</label>
                    </div>
                    <div class="form-field locations">
                        {{address}}
                        <button (click)="getCurrentLocation()" class="btn btn-dark btn-block" type="button">
                            <i class="bi-geo-alt"></i>
                            Use Current Location
                        </button>
                    </div>
                </li>
                <li>
                    <div class="form-label">
                        <label>Space for</label>
                    </div>
                    <div class="form-field sizes">
                        <div *ngFor="let option of sizeOptions">
                            <label [ngClass]="option.value == location.size ? 'btn-success' : 'btn-outline-secondary'" class="btn"
                                   for="size-{{option.value}}">{{option.name}}
                                <input [(ngModel)]="location.size" id="size-{{option.value}}" name="size" type="radio" value="{{option.value}}">
                            </label>
                        </div>
                    </div>
                </li>

                <li>
                    <div class="form-label">
                        <label>All day parking</label>
                    </div>
                    <div class="form-field locations">
                        <div class="btn-group">
                            <input [(ngModel)]="location.allDay" [value]="true" checked class="btn-check" id="all-day-yes" name="all-day" type="radio" />
                            <label [ngClass]="location.allDay ? 'btn-success' : 'btn-secondary'" class="btn" for="all-day-yes">Yes</label>
                            <input [(ngModel)]="location.allDay" [value]="false" class="btn-check" id="all-day-no" name="all-day" type="radio" />
                            <label [ngClass]="!location.allDay ? 'btn-success' : 'btn-secondary'" class="btn btn-secondary" for="all-day-no">No</label>
                        </div>
                    </div>
                </li>

                <li *ngIf="!location.allDay">
                    <div class="form-label">
                        <label>Time limit</label>
                    </div>
                    <div class="form-field">
                        <input [(ngModel)]="location.hourLimit" class="form-control" name="name" placeholder="Hours" type="number" />
                    </div>
                </li>

                <li>
                    <div class="form-label">
                        <label>Restricted Hours</label>
                    </div>
                    <div class="form-field locations">
                        <div class="btn-group">
                            <input [(ngModel)]="location.restrictedHours" [value]="true" class="btn-check" id="restricted-hours-yes" name="restricted-hours"
                                   type="radio" />
                            <label [ngClass]="location.restrictedHours ? 'btn-success' : 'btn-secondary'" class="btn btn-secondary" for="restricted-hours-yes">Yes</label>
                            <input [(ngModel)]="location.restrictedHours" [value]="false" checked class="btn-check" id="restricted-hours-no"
                                   name="restricted-hours" type="radio" />
                            <label [ngClass]="!location.restrictedHours ? 'btn-success' : 'btn-secondary'" class="btn btn-secondary" for="restricted-hours-no">No</label>
                        </div>
                    </div>
                </li>

                <li *ngIf="location.restrictedHours">
                    <div class="form-label">
                        <label>Available Times</label>
                    </div>
                    <div class="form-field locations">
                        <div class="btn-group">
                            <input (ngModelChange)="location.startTime = $event" [ngModel]="location.startTime | date:'hh:mm'" class="form-control" name="start-time" placeholder="Start Time"
                                   type="time" />
                            <input (ngModelChange)="location.endTime = $event" [ngModel]="location.endTime | date:'hh:mm'" class="form-control" name="end-time" placeholder="End Time"
                                   type="time" />
                        </div>
                    </div>
                </li>

            </ul>
        </fieldset>

        <fieldset>
            <ul>
                <li>
                    <div class="form-buttons">
                        <a (click)="onSubmit()" class="btn btn-primary" role="button">Submit</a>
                        <a (click)="onCancel()" class="btn btn-dark">
                            Cancel
                        </a>
                    </div>
                </li>
            </ul>
        </fieldset>
    </form>
</article>
