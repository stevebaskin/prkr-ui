<article class="content">

    <header class="title-bar">
        <button class="btn btn-dark btn-block" type="button" routerLink="/locations/add">
            <i class="bi-signpost-split-fill"></i>
            Add a Park
        </button>
    </header>

    <div class="marker-info" *ngIf="marker">
        <h3>{{marker.name}}</h3>
        <h4>{{marker.position.toString()}}</h4>
        <h5>Parking for: {{getSizeOptionByValue(marker.size)}}</h5>
        <a href="{{buildDirectionsLink(marker)}}" class="btn btn-primary" role="button" target="_blank">Get Directions</a>
    </div>


</article>
