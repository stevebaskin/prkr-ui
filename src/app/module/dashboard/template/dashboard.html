<article class="content">

    <header class="title-bar">
        <button class="btn btn-dark btn-block" type="button" routerLink="/locations/add">
            <i class="bi-signpost-split-fill"></i>
            Add a Park
        </button>
    </header>

    <div class="marker" *ngIf="marker">
        <h3>{{marker.name}}</h3>
        <div *ngIf="marker.size" class="street-sign">
            <div class="hour-limit">{{marker.hourLimit}}P</div>
            <div class="title">Motor Cycles Only</div>
            <div class="size">Spaces: {{getSizeOptionByValue(marker.size)}}</div>
            <div class="times" *ngIf="marker.startTime && marker.endTime">
                <div class="start-time">
                    {{marker.startTime | date: getTimeStringFormat(marker.startTime)}}
                </div>
                <span>-</span>
                <div class="end-time">
                    {{marker.endTime | date: getTimeStringFormat(marker.endTime)}}
                </div>
            </div>
            <div class="arrow">⟷</div>
        </div>


        <a *ngIf="marker.size" href="{{buildDirectionsLink(marker)}}" class="btn btn-primary" role="button" target="_blank">Get Directions</a>
    </div>

</article>
